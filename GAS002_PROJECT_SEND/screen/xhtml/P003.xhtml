<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROJECT: SEND - HISTORY</title>
  <link rel="stylesheet" type="text/css" href="../common/style.css" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

<body class="history-page">
  <div id="wrapper">
    <div class="screen-id">SCREEN ID: P003</div>
    <h1>一括履歴・実績</h1>
    <div class="screen-subtitle">ジム・外岩のアクティビティ一元管理</div>

    <div id="loading" class="loading-box">
      <div class="spinner"></div>
      <p>スプレッドシートから履歴を読み込み中...</p>
    </div>

    <div id="errorMessage" class="error hidden"></div>

    <div id="historyContainer" class="hidden">
      <div class="table-responsive">
        <table class="history-table">
          <thead>
            <tr>
              <th class="col-date">日付</th>
              <th class="col-loc">場所/壁</th>
              <th class="col-grade">級/V</th>
              <th class="col-result">結果</th>
            </tr>
          </thead>
          <tbody id="historyBody">
            </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="global-nav">
    <button type="button" class="nav-item" onclick="RouteSelector.moveTo('P000')">ホーム</button>
    <button type="button" class="nav-item" onclick="RouteSelector.moveTo('P001')">ジム記録</button>
    <button type="button" class="nav-item" onclick="RouteSelector.moveTo('P002')">外岩記録</button>
    <button type="button" class="nav-item active" onclick="RouteSelector.moveTo('P003')">履歴</button>
  </div>

  <input type="hidden" id="gasEndpoint" value="https://script.google.com/macros/s/AKfycbwYG453kPyBUqOfqjj-Fuw4voANXAKuRQiHyNmr7CubLLAifE13yl-r-TT_ao6CPC5P/exec" />

  <script type="text/javascript" src="../common/climbingCore.js"></script>
</body>
</html>
